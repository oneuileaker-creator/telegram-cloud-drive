# render.yaml
services:
  # A Docker service for our FastAPI backend
  - type: web
    name: ftms-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: APP_NAME
        value: FTMS
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ftms-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: ftms-db
          property: connectionString

databases:
  - name: ftms-db
    plan: free
